name: CI

on:
  push:
    branches: [master, main]
  pull_request:

# `prisma validate` and `prisma generate` parse env() entries in the schema
# eagerly — they read the variable, but they don't connect. A dummy URL keeps
# them offline-quiet without exposing secrets to the runner.
env:
  DATABASE_URL: postgresql://ci:ci@localhost:5432/ci?schema=public
  DIRECT_URL: postgresql://ci:ci@localhost:5432/ci?schema=public

jobs:
  gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Type check
        run: npx tsc --noEmit

      - name: Validate Prisma schema
        run: npx prisma validate

      - name: Run tests
        run: npm run test -- --passWithNoTests
