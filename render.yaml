services:
  - type: web
    name: pawmate-backend
    runtime: docker
    dockerfilePath: ./Dockerfile
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: DATABASE_URL
        fromDatabase:
          name: pawmate-postgres
          property: connectionString
      - key: REDIS_HOST
        fromService:
          name: pawmate-redis
          type: redis
          property: host
      - key: REDIS_PORT
        fromService:
          name: pawmate-redis
          type: redis
          property: port
      - key: REDIS_PASSWORD
        fromService:
          name: pawmate-redis
          type: redis
          property: password
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: ENCRYPTION_KEY
        generateValue: true
      - key: PLATFORM_COMMISSION_PERCENT
        value: "15"
      - key: BOOKING_TIMEOUT_MINUTES
        value: "10"

databases:
  - name: pawmate-postgres
    databaseName: pawmate
    user: pawmate
    plan: free

  - name: pawmate-redis
    plan: free
